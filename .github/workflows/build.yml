# ============================================================
#  Build & publish the LaTeX documents of DBMS_10.
#
#  This is the reference workflow for your term-project
#  documentation. Copy it (together with the Makefile) into
#  your own documentation repository. On every pushed tag that
#  matches  v*  it builds the PDFs and attaches them to a
#  GitHub Release.
# ============================================================
name: Build & Publish

on:
  push:
    # Tag pushes (v*) build AND create a release; branch pushes only build,
    # so you notice breakage early (see the release step's `if:`).
    branches: [ master, main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -q
          sudo apt-get install -y latexmk \
            texlive-latex-extra \
            texlive-lang-german \
            texlive-fonts-recommended

      - name: Build all PDFs
        run: make all

      - name: Upload PDFs as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: out/*.pdf

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "DBMS_10 ${{ github.ref_name }}" \
            --notes "Automatically built documents for tag \`${{ github.ref_name }}\`: exercise, proposal template and example documentation." \
            out/*.pdf
